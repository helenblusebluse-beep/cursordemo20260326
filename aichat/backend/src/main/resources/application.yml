server:
  port: 8091

spring:
  datasource:
    url: jdbc:h2:file:./data/aichat;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

jwt:
  secret: change-this-secret-key-please
  expiration-seconds: 86400

