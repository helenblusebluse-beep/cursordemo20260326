# 本地开发：在本机已安装 MySQL 且已导入 zhulong 库时使用。
# 启动：mvn spring-boot:run -Dspring-boot.run.profiles=local
# 或：java -jar ... --spring.profiles.active=local
spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/zhulong?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&useSSL=false&serverTimezone=Asia/Shanghai
    hikari:
      connection-init-sql: SET NAMES utf8mb4 COLLATE utf8mb4_unicode_ci
