<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>图片压缩 - 工具小站</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="在浏览器本地压缩图片，调整质量与尺寸后下载结果。" />
    <link rel="stylesheet" href="../assets/styles.css" />
  </head>
  <body>
    <main class="container tool-page">
      <div class="breadcrumb">
        <a href="../index.html">← 返回首页</a>
        <span class="badge">本地处理 · 不上传服务器</span>
      </div>

      <h1 class="section-title">图片压缩</h1>
      <p class="section-sub">上传图片，调整质量或最大宽度，然后下载压缩后的结果。</p>

      <div class="tool-layout">
        <section class="panel">
          <h2 class="panel-title">1) 上传与预览</h2>
          <p class="panel-sub">支持拖拽上传。若你选择导出为 JPG/WebP，可使用“质量”控制体积。</p>

          <div id="dropzone" class="dropzone" role="button" tabindex="0" aria-label="拖拽上传区">
            <div class="dropzone-inner">
              <p class="dropzone-strong">拖拽图片到此处</p>
              <p class="dropzone-hint">或点击选择文件（JPG / PNG / WebP）</p>
              <input id="fileInput" type="file" accept="image/*" />
            </div>
          </div>

          <div id="previewWrap" class="preview" style="margin-top: 12px; display: none">
            <div class="preview-media">
              <img id="previewImg" alt="预览图片" />
            </div>
            <div class="meta">
              <div>原图：<code id="srcMeta">-</code></div>
              <div>导出后：<code id="outMeta">-</code></div>
            </div>
          </div>
        </section>

        <aside class="panel">
          <h2 class="panel-title">2) 压缩参数</h2>
          <form id="form" class="form">
            <div class="field">
              <div class="label-row">
                <label for="outType">导出格式</label>
                <span class="help">PNG 体积可能较大</span>
              </div>
              <select id="outType" class="select">
                <option value="image/jpeg">JPG</option>
                <option value="image/webp">WebP</option>
                <option value="image/png">PNG</option>
              </select>
            </div>

            <div class="field" id="qualityField">
              <div class="label-row">
                <label for="quality">质量</label>
                <span class="help"><span id="qualityText">0.80</span></span>
              </div>
              <div class="range-row">
                <input id="quality" type="range" min="0.1" max="1" step="0.01" value="0.8" />
                <input id="qualityNum" class="input input-number" type="number" min="0.1" max="1" step="0.01" value="0.8" />
              </div>
            </div>

            <div class="field">
              <div class="label-row">
                <label for="maxWidth">最大宽度（可选）</label>
                <span class="help">保持比例缩放</span>
              </div>
              <input id="maxWidth" class="input" type="number" min="1" placeholder="例如 1280（留空表示不缩放）" />
            </div>

            <div class="actions">
              <button id="btnRun" type="button" class="btn btn-primary" disabled>开始压缩</button>
              <button id="btnDownload" type="button" class="btn btn-secondary" disabled>下载结果</button>
              <button id="btnReset" type="button" class="btn btn-ghost">清空</button>
            </div>

            <div id="toast" class="toast" style="display: none"></div>
          </form>
        </aside>
      </div>
    </main>

    <script type="module" src="../assets/tools/imageCompress.js"></script>
  </body>
</html>
