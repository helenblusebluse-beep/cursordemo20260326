<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>图片格式转换 - 工具小站</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="在浏览器本地将图片转换为 JPG/PNG/WebP 并下载。" />
    <link rel="stylesheet" href="../assets/styles.css" />
  </head>
  <body>
    <main class="container tool-page">
      <div class="breadcrumb">
        <a href="../index.html">← 返回首页</a>
        <span class="badge">本地处理 · 不上传服务器</span>
      </div>

      <h1 class="section-title">图片格式转换</h1>
      <p class="section-sub">上传图片，选择导出格式（JPG / PNG / WebP），一键生成并下载。</p>

      <div class="tool-layout">
        <section class="panel">
          <h2 class="panel-title">1) 上传与预览</h2>
          <p class="panel-sub">拖拽或点击选择图片文件。</p>

          <div id="dropzone" class="dropzone" role="button" tabindex="0" aria-label="拖拽上传区">
            <div class="dropzone-inner">
              <p class="dropzone-strong">拖拽图片到此处</p>
              <p class="dropzone-hint">或点击选择文件（JPG / PNG / WebP）</p>
              <input id="fileInput" type="file" accept="image/*" />
            </div>
          </div>

          <div id="previewWrap" class="preview" style="margin-top: 12px; display: none">
            <div class="preview-media">
              <img id="previewImg" alt="预览图片" />
            </div>
            <div class="meta">
              <div>原图：<code id="srcMeta">-</code></div>
              <div>导出后：<code id="outMeta">-</code></div>
            </div>
          </div>
        </section>

        <aside class="panel">
          <h2 class="panel-title">2) 转换参数</h2>
          <form class="form">
            <div class="field">
              <div class="label-row">
                <label for="outType">导出格式</label>
                <span class="help">透明背景建议用 PNG</span>
              </div>
              <select id="outType" class="select">
                <option value="image/png">PNG</option>
                <option value="image/jpeg">JPG</option>
                <option value="image/webp">WebP</option>
              </select>
            </div>

            <div class="field" id="qualityField" style="display: none">
              <div class="label-row">
                <label for="quality">质量</label>
                <span class="help"><span id="qualityText">0.90</span></span>
              </div>
              <div class="range-row">
                <input id="quality" type="range" min="0.1" max="1" step="0.01" value="0.9" />
                <input id="qualityNum" class="input input-number" type="number" min="0.1" max="1" step="0.01" value="0.9" />
              </div>
            </div>

            <div class="actions">
              <button id="btnRun" type="button" class="btn btn-primary" disabled>开始转换</button>
              <button id="btnDownload" type="button" class="btn btn-secondary" disabled>下载结果</button>
              <button id="btnReset" type="button" class="btn btn-ghost">清空</button>
            </div>

            <div id="toast" class="toast" style="display: none"></div>
          </form>
        </aside>
      </div>
    </main>

    <script type="module" src="../assets/tools/imageFormat.js"></script>
  </body>
</html>
