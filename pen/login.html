<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>登录 - 管理后台</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      background: radial-gradient(circle at top, #1d4ed8 0, #020617 55%, #020617 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #0f172a;
    }
    .login-card {
      width: 360px;
      background-color: #ffffff;
      border-radius: 16px;
      padding: 28px 26px 26px;
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.35);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }
    .logo-mark {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      background: linear-gradient(135deg, #2563eb, #38bdf8);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      font-weight: 700;
      font-size: 18px;
    }
    .logo-text {
      font-weight: 600;
      font-size: 16px;
      color: #0f172a;
    }
    .title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 18px;
    }
    .form-group {
      margin-bottom: 14px;
    }
    .label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 4px;
      color: #111827;
    }
    .input {
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s, background-color 0.15s;
      background-color: #f9fafb;
    }
    .input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 1px rgba(37, 99, 235, 0.35);
      background-color: #ffffff;
    }
    .helper-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      font-size: 12px;
    }
    .checkbox-label {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      color: #4b5563;
    }
    .checkbox {
      width: 14px;
      height: 14px;
      border-radius: 4px;
      border: 1px solid #9ca3af;
      appearance: none;
      outline: none;
      display: inline-block;
      position: relative;
    }
    .checkbox:checked {
      background-color: #2563eb;
      border-color: #2563eb;
    }
    .checkbox:checked::after {
      content: "";
      position: absolute;
      left: 3px;
      top: 1px;
      width: 6px;
      height: 9px;
      border: 2px solid #ffffff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }
    .link {
      color: #2563eb;
      text-decoration: none;
      cursor: pointer;
    }
    .link:hover {
      text-decoration: underline;
    }
    .btn-primary {
      width: 100%;
      padding: 9px 12px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 10px;
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.45);
      transition: transform 0.1s, box-shadow 0.1s, filter 0.1s;
    }
    .btn-primary:hover {
      filter: brightness(1.02);
      box-shadow: 0 10px 22px rgba(37, 99, 235, 0.55);
      transform: translateY(-1px);
    }
    .btn-primary:active {
      transform: translateY(0);
      box-shadow: 0 5px 14px rgba(37, 99, 235, 0.45);
    }
    .footer-text {
      margin-top: 4px;
      text-align: center;
      font-size: 12px;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <div class="logo-mark">A</div>
      <div class="logo-text">管理后台</div>
    </div>

    <h1 class="title">登录</h1>
    <p class="subtitle">请输入账号和密码登录角色管理系统。</p>

    <form id="loginForm">
      <div class="form-group">
        <label class="label" for="username">账号</label>
        <input
          id="username"
          class="input"
          type="text"
          placeholder="请输入账号"
          autocomplete="username"
          required
        />
      </div>
      <div class="form-group">
        <label class="label" for="password">密码</label>
        <input
          id="password"
          class="input"
          type="password"
          placeholder="请输入密码"
          autocomplete="current-password"
          required
        />
      </div>

      <div class="helper-row">
        <label class="checkbox-label">
          <input type="checkbox" class="checkbox" />
          <span>记住我</span>
        </label>
        <a class="link" href="javascript:void(0)">忘记密码？</a>
      </div>

      <button type="submit" class="btn-primary">登录</button>
    </form>

    <p class="footer-text">
      测试环境可直接点击登录按钮，将跳转到角色管理页面。
    </p>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    form.addEventListener('submit', function (e) {
      e.preventDefault();
      // 这里可以加实际校验逻辑，当前直接跳转到角色管理页面
      window.location.href = 'test.html';
    });
  </script>
</body>
</html>
